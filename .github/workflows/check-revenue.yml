name: Check ASE & TSMC Revenue Pages

on:
  schedule:
    # Every 10 minutes. GitHub may delay this by a few minutes under load.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab to test

permissions:
  contents: write  # needed so the workflow can commit state.json back to the repo

jobs:
  check-revenue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: Run check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_revenue.py

      - name: Commit updated state file
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update notification state [skip ci]"
            git push
          else
            echo "No change to state.json — nothing to commit."
          fi
